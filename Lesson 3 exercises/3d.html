<button class="start">
    Get started
</button>
<button class="download">
    Download
</button>
<style>
    .start{
        font-weight:bold;
        background-color:rgb(121, 82, 179);
        color:white;
        border:none;
        border-radius:3px;
        height:30px;
        width:100px;
        cursor:pointer; 

    }
    .download{
        font-weight:bold;
        background-color:white;
        color:rgb(108, 117, 125);
        border-radius:3px;
        height:30px;
        width:90px;
        border-width:1px;
        border-color: rgb(108, 117, 125);
        border-style:solid;
        cursor:pointer;
        margin-left: 6px;
        transition:background-color 0.15s,color 0.15s,cursor 0.15s;
    }
    .start:hover{
        background-color:rgb(100, 68, 148);
    }
    .download:hover{
        background-color:rgb(108, 117, 125);
        color:white;
    }
</style>
